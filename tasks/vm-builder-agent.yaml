- name: Install Terraform apt repository prerequisites
  apt:
    name:
      - gnupg
      - software-properties-common
    state: present

- name: Download HashiCorp apt repository key
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
    mode: "0644"
    owner: root
    group: root
  register: hashicorp_apt_key

- name: Dearmor HashiCorp apt repository key
  command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /usr/share/keyrings/hashicorp-archive-keyring.gpg
      - /usr/share/keyrings/hashicorp-archive-keyring.asc
  when: hashicorp_apt_key.changed

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_facts.lsb.codename }} main"
    filename: hashicorp
    state: present
    update_cache: yes

- name: Install Terraform
  apt:
    name: terraform
    state: present

- name: Install vm-builder-agent binary
  get_url:
    url: "https://github.com/tlhakhan/vm-builder-agent/releases/latest/download/vm-builder-agent-linux-amd64"
    dest: /usr/local/bin/vm-builder-agent
    mode: "0755"
    owner: root
    group: root
  notify: restart vm-builder-agent

- name: Install vm-builder-agent systemd unit
  copy:
    dest: /etc/systemd/system/vm-builder-agent.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=vm-builder-agent
      Documentation=https://github.com/tlhakhan/vm-builder-agent
      After=network-online.target libvirtd.service
      Wants=network-online.target
      Requires=libvirtd.service

      [Service]
      ExecStartPre=mkdir -p /var/lib/vm-builder-agent/workspaces
      ExecStartPre=mkdir -p /etc/vm-builder-agent/private
      ExecStart=/usr/local/bin/vm-builder-agent \
        --listen :8443 \
        --agent-mtls \
        --agent-trusted-ca-url {{ vm_builder_agent_trusted_ca_url }} \
        --private-dir /etc/vm-builder-agent/private \
        --agent-authorized-client-cn vm-builder-apiserver \
        --core-repo https://github.com/tlhakhan/vm-builder-core \
        --terraform /usr/bin/terraform \
        --workspaces-dir /var/lib/vm-builder-agent/workspaces
      Restart=on-failure
      RestartSec=5s
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=vm-builder-agent
      User=root
      Group=root

      [Install]
      WantedBy=multi-user.target
  notify:
    - reload systemd
    - restart vm-builder-agent

- name: Enable and start vm-builder-agent
  systemd:
    name: vm-builder-agent.service
    enabled: yes
    state: started
    daemon_reload: yes
