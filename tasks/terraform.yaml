- name: Install Terraform apt repository prerequisites
  apt:
    name:
      - gnupg
      - software-properties-common
    state: present

- name: Download HashiCorp apt repository key
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
    mode: "0644"
    owner: root
    group: root
  register: hashicorp_apt_key

- name: Dearmor HashiCorp apt repository key
  command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /usr/share/keyrings/hashicorp-archive-keyring.gpg
      - /usr/share/keyrings/hashicorp-archive-keyring.asc
  when: hashicorp_apt_key.changed

- name: Add HashiCorp apt repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_facts.lsb.codename }} main"
    filename: hashicorp
    state: present
    update_cache: yes

- name: Install Terraform
  apt:
    name: terraform
    state: present
