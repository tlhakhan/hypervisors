- name: Setup hypervisor
  hosts: hypervisors

  pre_tasks:
    - name: Hypervisor OS is Ubuntu (noble)
      assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
          - ansible_facts.distribution_release == "noble"
        fail_msg: "This playbook only supports Ubuntu Noble (24.04)."
        success_msg: "Assertions passed, running playbook..."

    - name: vm-builder-agent mTLS settings are provided
      assert:
        that:
          - vm_builder_agent_trusted_ca_url | length > 0
        fail_msg: "Set vm_builder_agent_trusted_ca_url before enabling vm-builder-agent."
      when: vm_builder_agent_enabled | bool

  tasks:
    - import_tasks: tasks/packages.yaml

    - import_tasks: tasks/gpu.yaml

    - import_tasks: tasks/network.yaml

    - import_tasks: tasks/storage.yaml

    - import_tasks: tasks/system.yaml

    - import_tasks: tasks/wakelet.yaml
      when: wakelet_enabled | bool

    - import_tasks: tasks/vm-builder-agent.yaml
      when: vm_builder_agent_enabled | bool

  handlers:
    - name: restart avahi-daemon
      systemd:
        name: avahi-daemon
        state: restarted
        enabled: yes

    - name: update grub
      command: update-grub

    - name: update initramfs
      command: update-initramfs -u

    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart vm-builder-agent
      systemd:
        name: vm-builder-agent.service
        state: restarted
      when: vm_builder_agent_enabled | bool

    - name: reboot system
      command: reboot
      async: 1
      poll: 0
      ignore_errors: True
