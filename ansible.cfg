# Ansible configuration file
# This file contains settings for Ansible behavior

[defaults]
# Disable retry files
retry_files_enabled = False
# Disable command warnings
command_warnings = False
# Enable callback plugins for timing and YAML output
callback_plugins = timer,yaml
# Inventory file location
inventory = inventory.yaml
# Automatically select Python interpreter silently
interpreter_python = auto_silent

[privilege_escalation]
# Ask for password when escalating privileges
become_ask_pass = True
